<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segue-me 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --vinho: #6B1A2A;
    --vinho-escuro: #3d0e18;
    --vinho-claro: #8B2A3F;
    --dourado: #C9A84C;
    --creme: #f5efe6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--vinho-escuro);
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(107,26,42,0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(26,111,181,0.15) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 1.2s ease both;
  }

  .verse-tag {
    display: inline-block;
    font-family: 'Cinzel Decorative', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--dourado);
    text-transform: uppercase;
    border-top: 1px solid rgba(201,168,76,0.4);
    border-bottom: 1px solid rgba(201,168,76,0.4);
    padding: 6px 20px;
    margin-bottom: 20px;
  }

  .title-vem {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(14px, 3vw, 18px);
    color: rgba(245,239,230,0.7);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .title-segue {
    font-family: 'Crimson Text', serif;
    font-size: clamp(52px, 11vw, 80px);
    font-style: italic;
    font-weight: 600;
    color: var(--creme);
    line-height: 0.9;
    text-shadow: 0 0 60px rgba(201,168,76,0.3), 0 2px 20px rgba(0,0,0,0.5);
    margin-bottom: 4px;
  }

  .mt-ref {
    font-family: 'Crimson Text', serif;
    font-size: 16px;
    color: rgba(201,168,76,0.6);
    letter-spacing: 3px;
    margin-top: 10px;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--dourado), transparent);
    margin: 24px auto;
  }

  .divider-cross {
    text-align: center;
    color: var(--dourado);
    font-size: 18px;
    opacity: 0.7;
  }

  /* CHAPEL */
  .chapel-wrapper {
    position: relative;
    width: 100%;
    max-width: 480px;
    animation: fadeIn 1.8s ease both 0.3s;
  }

  .chapel-glow {
    position: absolute;
    inset: -20px;
    background: radial-gradient(ellipse at 50% 40%, rgba(0,212,255,0.15) 0%, transparent 60%);
    animation: glowPulse 4s ease-in-out infinite;
    z-index: -1;
    border-radius: 50%;
  }

  .chapel-frame {
    position: relative;
    border: 2px solid rgba(201,168,76,0.35);
    border-radius: 2px;
    overflow: hidden;
    box-shadow:
      0 0 0 6px rgba(61,14,24,0.8),
      0 0 0 8px rgba(201,168,76,0.2),
      0 20px 80px rgba(0,0,0,0.7),
      0 0 120px rgba(0,212,255,0.1);
  }

  .chapel-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(61,14,24,0.7) 100%);
    z-index: 2;
    pointer-events: none;
  }

  .chapel-img {
    width: 100%;
    display: block;
    filter: saturate(1.1) brightness(0.95);
  }

  .corner { position: absolute; width: 28px; height: 28px; z-index: 3; }
  .corner-tl { top: -1px; left: -1px; border-top: 2px solid var(--dourado); border-left: 2px solid var(--dourado); }
  .corner-tr { top: -1px; right: -1px; border-top: 2px solid var(--dourado); border-right: 2px solid var(--dourado); }
  .corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--dourado); border-left: 2px solid var(--dourado); }
  .corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--dourado); border-right: 2px solid var(--dourado); }

  /* PLAYER */
  .player-section {
    width: 100%;
    max-width: 480px;
    margin-top: 28px;
    animation: fadeUp 1.5s ease both 0.6s;
  }

  .song-title-area {
    text-align: center;
    margin-bottom: 20px;
  }

  .song-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(201,168,76,0.5);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .song-name {
    font-family: 'Crimson Text', serif;
    font-size: 26px;
    font-style: italic;
    color: var(--creme);
    text-shadow: 0 0 30px rgba(201,168,76,0.2);
  }

  .song-artist {
    font-family: 'Crimson Text', serif;
    font-size: 14px;
    color: rgba(201,168,76,0.55);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .player-box {
    background: rgba(61,14,24,0.6);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    padding: 20px 24px;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }

  .player-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
  }

  .player-inner {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .play-btn {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 2px solid var(--dourado);
    background: rgba(201,168,76,0.1);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dourado);
    font-size: 20px;
    flex-shrink: 0;
    transition: all 0.3s ease;
    position: relative;
  }

  .play-btn:hover {
    background: rgba(201,168,76,0.25);
    box-shadow: 0 0 20px rgba(201,168,76,0.3);
    transform: scale(1.05);
  }

  .play-btn.playing::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.4);
    animation: rippleRing 1.5s ease-out infinite;
  }

  .player-info { flex: 1; min-width: 0; }

  .progress-bar-container {
    position: relative;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--vinho-claro), var(--dourado));
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(245,239,230,0.4);
    letter-spacing: 1px;
    font-family: monospace;
  }

  .loop-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Cinzel Decorative', serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(201,168,76,0.5);
    text-transform: uppercase;
    margin-top: 12px;
    justify-content: center;
  }

  .loop-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--dourado);
    opacity: 0.5;
    animation: loopDot 2s ease-in-out infinite;
  }
  .loop-dot:nth-child(2) { animation-delay: 0.3s; }
  .loop-dot:nth-child(3) { animation-delay: 0.6s; }
  .loop-dot:nth-child(5) { animation-delay: 0.3s; }
  .loop-dot:nth-child(6) { animation-delay: 0.6s; }

  .tap-hint {
    text-align: center;
    font-family: 'Cinzel Decorative', serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(201,168,76,0.45);
    text-transform: uppercase;
    margin-top: 14px;
    animation: tapPulse 2s ease-in-out infinite;
  }

  .footer {
    margin-top: 40px;
    text-align: center;
    animation: fadeIn 2s ease both 1.2s;
  }

  .footer-text {
    font-family: 'Crimson Text', serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(245,239,230,0.3);
    letter-spacing: 1px;
  }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
  @keyframes glowPulse {
    0%,100% { opacity:0.6; transform:scale(1); }
    50%     { opacity:1;   transform:scale(1.05); }
  }
  @keyframes rippleRing {
    0%   { transform:scale(1);   opacity:0.6; }
    100% { transform:scale(1.6); opacity:0; }
  }
  @keyframes loopDot {
    0%,100% { opacity:0.3; transform:scale(1);   }
    50%     { opacity:1;   transform:scale(1.4); }
  }
  @keyframes tapPulse {
    0%,100% { opacity:0.3; }
    50%     { opacity:0.8; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="verse-tag">MT 9,9</div>
    <div class="title-vem">Vem e</div>
    <div class="title-segue">"Segue-me"</div>
    <div class="mt-ref">Mateus 9,9</div>
  </div>

  <div class="divider"></div>
  <div class="divider-cross">✦</div>
  <div class="divider"></div>

  <div class="chapel-wrapper">
    <div class="chapel-glow"></div>
    <div class="chapel-frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <img class="chapel-img" src="capela.jpg" alt="Adoração ao Santíssimo Sacramento" />
    </div>
  </div>

  <div class="player-section">
    <div class="song-title-area">
      <span class="song-label">♩ tocando agora</span>
      <div class="song-name">Solidão do Tabernáculo</div>
      <div class="song-artist">Frei Silvio</div>
    </div>

    <div class="player-box">
      <div class="player-inner">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <div class="player-info">
          <div class="progress-bar-container" onclick="seek(event)">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="duration">—</span>
          </div>
        </div>
      </div>
      <div class="loop-indicator">
        <div class="loop-dot"></div>
        <div class="loop-dot"></div>
        <div class="loop-dot"></div>
        <span>loop contínuo</span>
        <div class="loop-dot"></div>
        <div class="loop-dot"></div>
        <div class="loop-dot"></div>
      </div>
      <div class="tap-hint" id="tapHint">✦ toque em qualquer lugar para iniciar ✦</div>
    </div>
  </div>

  <div class="footer">
    <div class="divider" style="width:120px; margin-bottom:12px;"></div>
    <div class="footer-text">Adoração ao Santíssimo Sacramento</div>
  </div>

</div>

<audio id="audio" loop src="musica.mp3"></audio>

<script>
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const progressBar = document.getElementById('progressBar');
  const currentTimeEl = document.getElementById('currentTime');
  const durationEl = document.getElementById('duration');
  let started = false;

  function startAudio() {
    const hint = document.getElementById('tapHint');
    if (hint) hint.style.display = 'none';
    if (!started) {
      started = true;
      audio.play().then(() => {
        playBtn.innerHTML = '&#9646;&#9646;';
        playBtn.classList.add('playing');
      }).catch(e => console.log(e));
    }
  }

  document.addEventListener('click', startAudio, { once: true });
  document.addEventListener('touchstart', startAudio, { once: true });

  function togglePlay() {
    if (audio.paused) {
      audio.play().then(() => {
        playBtn.innerHTML = '&#9646;&#9646;';
        playBtn.classList.add('playing');
        started = true;
        const hint = document.getElementById('tapHint');
        if (hint) hint.style.display = 'none';
      });
    } else {
      audio.pause();
      playBtn.innerHTML = '&#9654;';
      playBtn.classList.remove('playing');
    }
  }

  function seek(e) {
    if (!audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  }

  function formatTime(s) {
    if (!s || isNaN(s)) return '0:00';
    return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
  }

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
      currentTimeEl.textContent = formatTime(audio.currentTime);
    }
  });

  audio.addEventListener('loadedmetadata', () => {
    durationEl.textContent = formatTime(audio.duration);
  });
</script>
</body>
</html>
